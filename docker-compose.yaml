version: '3.8'

services:
  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=harena
      - POSTGRES_PASSWORD=harenapass
      - POSTGRES_DB=harena_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-service:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=harena
      - POSTGRES_PASSWORD=harenapass
      - POSTGRES_DB=harena_db
      - BRIDGE_CLIENT_ID=${BRIDGE_CLIENT_ID}
      - BRIDGE_CLIENT_SECRET=${BRIDGE_CLIENT_SECRET}
    volumes:
      - .:/app
    command: bash -c "alembic upgrade head && uvicorn user_service.main:app --host 0.0.0.0 --port 8001 --reload"

volumes:
  postgres_data: